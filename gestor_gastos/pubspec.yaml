name: gestor_gastos
description: Gestor de Gastos Personales - Flutter Frontend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Network
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  
  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  intl: ^0.18.1
  fl_chart: ^0.65.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Date
  date_format: ^2.0.8
  
  # Permissions
  permission_handler: ^11.2.0
  
  # Charts
  charts_flutter: ^0.12.0
  
  # Icons
  font_awesome_flutter: ^10.7.0
  
  # Routing
  go_router: ^13.2.0
  
  # Validation
  form_field_validator: ^1.1.0
  
  # Logging
  logger: ^2.0.2+1
  
  # Crypto
  crypto: ^3.0.3
  
  # Json
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.6
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
