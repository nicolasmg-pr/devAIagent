name: fintrack
description: App de Gestión de Gastos Personales

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # HTTP Client
  dio: ^5.4.0
  
  # Charts
  fl_chart: ^0.66.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  path_provider: ^2.1.1
  csv: ^6.0.0
  url_launcher: ^6.2.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1
  date_format: ^2.0.7
  
  # Form Validation
  form_field_validator: ^1.1.0
  
  # Dependency Injection
  get_it: ^7.6.7
  
  # Routing
  go_router: ^13.0.0
  
  # Permissions
  permission_handler: ^11.2.0
  
  # Lottie animations
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
